[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    # Forces HTTPS — insurers' firewalls look for this
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Prevents your site being embedded in iframes (clickjacking protection)
    X-Frame-Options = "SAMEORIGIN"

    # Prevents MIME type sniffing attacks
    X-Content-Type-Options = "nosniff"

    # Controls referrer info sent when clicking links
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Controls browser features (camera, microphone etc — none needed here)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Content Security Policy — tells browsers what sources are trusted
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self';"

    # XSS protection for older browsers
    X-XSS-Protection = "1; mode=block"
